name: default
description: "Default preset - base configuration for interactive queries"

dataset:
  collection_name: ww2_events_10000
  dataset_name: wiki_10k
  questions_file: data/evaluation/eval_10k_200q.json

embedding:
  dimension: 384
  model_name: sentence-transformers/all-MiniLM-L6-v2

chunking:
  chunk_overlap: 50
  chunk_size: 512

retrieval:
  dense_weight: 0.7
  fusion_method: rrf
  rerank_k: 20
  sparse_weight: 0.3
  technique: vanilla
  top_k: 10

reranker:
  model_name: null
  type: none

generation:
  enabled: true
  llm_provider: openrouter
  max_tokens: 512
  model: mistralai/mistral-small-3.1-24b-instruct:free
  temperature: 0.0
  top_k_chunks: 3

evaluation:
  compute_bert_score: false
  compute_ragas: false
  compute_rouge: true
  k_values:
  - 1
  - 3
  - 5
  - 10

vector_db:
  backend: qdrant
  connection_params: null
  distance_metric: cosine
